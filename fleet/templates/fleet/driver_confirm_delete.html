{% extends 'base.html' %}
{% block title %}Удаление водителя — Автопарк «Ветерок»{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><i class="bi bi-exclamation-triangle"></i> Подтверждение</div>
            <div class="card-body text-center">
                <i class="bi bi-person-x" style="font-size: 4rem; color: #dc3545;"></i>
                <h4 class="mt-3">Удалить водителя?</h4>
                <p class="lead">{{ driver.name }}</p>
                <div class="alert alert-warning">Все связанные поездки будут удалены!</div>
                <form method="post">{% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg w-100"><i class="bi bi-trash"></i> Да, удалить</button>
                    <a href="{% url 'driver_list' %}" class="btn btn-secondary btn-lg w-100 mt-2">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
