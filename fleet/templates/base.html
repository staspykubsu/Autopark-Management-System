<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Автопарк «Ветерок»{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'fleet/css/custom.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="bi bi-taxi-front"></i> Автопарк «Ветерок»
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'car_list' %}">
                            <i class="bi bi-car-front"></i> Автомобили
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'driver_list' %}">
                            <i class="bi bi-people"></i> Водители
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'request_list' %}">
                            <i class="bi bi-file-text"></i> Заявки
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'trip_list' %}">
                            <i class="bi bi-journal"></i> Поездки
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'report' %}">
                            <i class="bi bi-bar-chart"></i> Отчеты
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">
                            <i class="bi bi-gear"></i> Админка
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
